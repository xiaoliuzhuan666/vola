services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vola}
      POSTGRES_USER: ${POSTGRES_USER:-vola}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vola_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vola} -d ${POSTGRES_DB:-vola}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    command: ["./vola", "server", "--listen", ":8080"]
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vola}:${POSTGRES_PASSWORD:-vola_dev}@db:5432/${POSTGRES_DB:-vola}?sslmode=disable
      PORT: "${PORT:-8080}"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      USER_STORAGE_QUOTA_BYTES: ${USER_STORAGE_QUOTA_BYTES:-100MB}
      INSTANCE_ADMIN_USER_IDS: ${INSTANCE_ADMIN_USER_IDS:-}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-db}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_ENDPOINT: ${TENCENT_COS_ENDPOINT:-}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_PREFIX: ${TENCENT_COS_PREFIX:-vola}
      TENCENT_COS_PATH_STYLE: ${TENCENT_COS_PATH_STYLE:-0}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GIT_MIRROR_HOSTED_ROOT: ${GIT_MIRROR_HOSTED_ROOT:-/data/git-mirrors}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      VOLA_ENABLE_PUBLIC_REGISTRATION: ${VOLA_ENABLE_PUBLIC_REGISTRATION:-}
    volumes:
      - gitmirrors:/data/git-mirrors
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  gitmirrors:
