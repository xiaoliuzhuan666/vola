name: CI
on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: |
          go install golang.org/x/tools/cmd/goimports@v0.43.0
          goimports -l . | (! grep .)

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vola
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vola_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - run: go test -p 1 ./... -v -race -coverprofile=coverage.out
        env:
          DATABASE_URL: postgres://vola:test@localhost:5432/vola_test?sslmode=disable
          VOLA_TEST_DB: postgres://vola:test@localhost:5432/vola_test?sslmode=disable
          JWT_SECRET: test-jwt-secret
          VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - run: go build -o vola ./cmd/vola/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build

  sync-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vola
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vola_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            sdk/javascript/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: cd sdk/javascript && npm ci
      - run: cd web && npm ci
      - run: |
          cd web
          npm run build
          rm -rf ../internal/web/dist
          cp -r dist ../internal/web/dist
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'httpx>=0.25.0'
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: go build -o /tmp/vola ./cmd/vola
      - run: /tmp/vola server --storage postgres --listen :8080 > /tmp/vola-server.log 2>&1 &
        env:
          DATABASE_URL: postgres://vola:test@localhost:5432/vola_test?sslmode=disable
          JWT_SECRET: test-jwt-secret
          VAULT_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PORT: '8080'
      - run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/vola-server.log
          exit 1
      - run: python -m unittest sdk/python/tests/test_sync_integration.py
        env:
          VOLA_TEST_URL: http://localhost:8080
          VOLA_CLI: /tmp/vola
      - run: npm test --prefix sdk/javascript
        env:
          VOLA_TEST_URL: http://localhost:8080
          VOLA_CLI: /tmp/vola
      - run: npx playwright test web/e2e/sync.spec.ts
        working-directory: web
        env:
          VOLA_TEST_URL: http://localhost:8080
          VOLA_CLI: /tmp/vola

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build, frontend, sync-integration]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t vola:test .
