name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, must match src-tauri/tauri.conf.json"
        required: true

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop ${{ matrix.artifact }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: macos-aarch64
            platform: macos-15
            tauriTarget: aarch64-apple-darwin
            bundles: ""
            goos: darwin
            goarch: arm64
          - artifact: macos-x86_64
            platform: macos-15-intel
            tauriTarget: x86_64-apple-darwin
            bundles: ""
            goos: darwin
            goarch: amd64
          - artifact: linux-x86_64
            platform: ubuntu-22.04
            tauriTarget: ""
            bundles: "appimage"
            goos: linux
            goarch: amd64
          - artifact: windows-x86_64
            platform: windows-latest
            tauriTarget: ""
            bundles: "nsis"
            goos: windows
            goarch: amd64
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.tauriTarget == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.tauriTarget != ''
        with:
          targets: ${{ matrix.tauriTarget }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Validate signing secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "Missing GitHub Actions secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
          ref_version="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref_version="${{ inputs.version }}"
          fi
          if [ "$app_version" != "$ref_version" ]; then
            echo "Release version ($ref_version) does not match src-tauri/tauri.conf.json ($app_version)."
            exit 1
          fi

      - name: Build bundled Vola sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o src-tauri/bin/vola ./cmd/vola/

      - name: Build desktop app
        shell: bash
        working-directory: src-tauri
        run: |
          set -euo pipefail
          args=()
          if [ -n "${{ matrix.tauriTarget }}" ]; then
            args+=(--target "${{ matrix.tauriTarget }}")
          fi
          if [ -n "${{ matrix.bundles }}" ]; then
            args+=(--bundles "${{ matrix.bundles }}")
          fi
          node ../web/node_modules/@tauri-apps/cli/tauri.js build --ci "${args[@]}"

      - name: Collect desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          while IFS= read -r -d '' artifact; do
            base="$(basename "$artifact")"
            cp "$artifact" "release-artifacts/${{ matrix.artifact }}-$base"
          done < <(find src-tauri/target -type f \( \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.dmg" -o \
            -name "*-setup.exe" -o \
            -name "*-setup.exe.sig" \
          \) -print0)
          test -n "$(find release-artifacts -type f -print -quit)"
          find release-artifacts -maxdepth 1 -type f -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact }}
          path: release-artifacts/*

  publish-release:
    name: Publish GitHub release
    needs:
      - desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi
          app_version="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"
          if [ "$version" != "$app_version" ]; then
            echo "Release version ($version) does not match src-tauri/tauri.conf.json ($app_version)."
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG_NAME=v$version" >> "$GITHUB_ENV"
          echo "PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      - name: Build latest.json
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release/build-tauri-latest-json.mjs \
            --version "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --assets-dir release-artifacts \
            --notes "Vola v$VERSION" \
            --published-at "$PUBLISHED_AT" \
            --output release-artifacts/latest.json

      - name: Prepare public release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          while IFS= read -r -d '' asset; do
            cp "$asset" release-upload/
          done < <(find release-artifacts -maxdepth 1 -type f \( \
            -name "latest.json" -o \
            -name "*.AppImage" -o \
            -name "*.app.tar.gz" -o \
            -name "*.dmg" -o \
            -name "*-setup.exe" \
          \) -print0)
          test -n "$(find release-upload -type f -print -quit)"
          find release-upload -maxdepth 1 -type f -print | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Vola ${{ env.TAG_NAME }}
          body: |
            Vola ${{ env.TAG_NAME }}

            This release includes desktop installers, required updater bundles, and `latest.json`.
          files: release-upload/*
          fail_on_unmatched_files: true
