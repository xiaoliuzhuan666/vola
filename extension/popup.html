<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vola</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #ffffff;
      --bg-secondary: #f8fafc;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --bg-secondary: #2a2a3c;
        --text: #e2e8f0;
        --text-secondary: #94a3b8;
        --border: #3b3b52;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .header-title {
      font-weight: 600;
      font-size: 16px;
    }

    .header-version {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: auto;
    }

    /* Sections */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-ok { background: var(--success); }
    .dot-err { background: var(--error); }
    .dot-off { background: var(--text-secondary); }

    /* Form */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border);
    }

    .btn-danger {
      background: none;
      color: var(--error);
      font-size: 12px;
      padding: 6px 12px;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .helper-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .section-divider {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin: 4px 0 12px;
    }

    /* Profile card */
    .profile-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }

    .profile-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .profile-bio {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .link-item:hover {
      background: var(--border);
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .toggle-label {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--border);
      border-radius: 22px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--primary);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* Platform checkboxes */
    .platform-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .platform-item input[type="checkbox"] {
      accent-color: var(--primary);
    }

    /* Message */
    .message {
      font-size: 12px;
      padding: 8px;
      border-radius: var(--radius);
      margin-top: 8px;
      display: none;
    }

    .message-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      display: block;
    }

    .message-success {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      display: block;
    }

    /* View toggle */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">H</div>
    <span class="header-title">Vola</span>
    <span class="header-version">v0.1.0</span>
  </div>

  <!-- View: Login -->
  <div id="view-login">
    <div class="section">
      <div class="section-title">连接配置</div>
      <div class="helper-text">推荐先登录 Vola 官方版。授权完成后，扩展会自动连接到 https://www.vola.ai。</div>
      <div class="btn-row" style="margin-bottom: 12px;">
        <button class="btn btn-secondary" id="btn-official-login" style="width: 100%;">登录官方版</button>
      </div>
      <div class="section-divider">或手动配置</div>
      <div class="form-group">
        <label for="input-url">Hub 服务地址</label>
        <input type="url" id="input-url" placeholder="https://www.vola.ai" />
      </div>
      <div class="form-group">
        <label for="input-token">Scoped Token</label>
        <input type="password" id="input-token" placeholder="ndt_xxxxxxxxxxxxxx" />
      </div>
      <button class="btn btn-primary" id="btn-connect">连接</button>
      <div id="login-message" class="message"></div>
    </div>
  </div>

  <!-- View: Connected -->
  <div id="view-connected" class="hidden">
    <!-- Status -->
    <div class="section">
      <div class="section-title">连接状态</div>
      <div class="status" id="connection-status">
        <span class="dot dot-ok"></span>
        <span>已连接</span>
      </div>
      <div class="profile-card" id="profile-card" style="margin-top: 12px;">
        <div class="profile-name" id="profile-name">-</div>
        <div class="profile-bio" id="profile-bio"></div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="section">
      <div class="section-title">快捷操作</div>
      <div class="links">
        <a class="link-item" id="link-dashboard">
          &#127968; 打开管理后台
        </a>
        <a class="link-item" id="link-new-token">
          &#128273; 打开 Token 管理
        </a>
      </div>
    </div>

    <!-- Settings -->
    <div class="section">
      <div class="section-title">设置</div>
      <div class="toggle-row">
        <span class="toggle-label">新对话自动注入上下文</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-auto-inject" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="platform-list" id="platform-list">
        <div class="platform-item">
          <input type="checkbox" id="plat-claude" data-platform="claude.ai" checked />
          <label for="plat-claude">Claude (claude.ai)</label>
        </div>
        <div class="platform-item">
          <input type="checkbox" id="plat-chatgpt" data-platform="chat.openai.com" checked />
          <label for="plat-chatgpt">ChatGPT (chat.openai.com / chatgpt.com)</label>
        </div>
        <div class="platform-item">
          <input type="checkbox" id="plat-gemini" data-platform="gemini.google.com" checked />
          <label for="plat-gemini">Gemini (gemini.google.com)</label>
        </div>
        <div class="platform-item">
          <input type="checkbox" id="plat-kimi" data-platform="kimi.moonshot.cn" checked />
          <label for="plat-kimi">Kimi (kimi.moonshot.cn)</label>
        </div>
      </div>
    </div>

    <!-- Disconnect -->
    <div class="section" style="text-align: center;">
      <button class="btn btn-danger" id="btn-disconnect">断开连接</button>
    </div>
  </div>

  <script src="lib/vola-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
