apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vola-postgres
  namespace: vola
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vola-postgres
  serviceName: vola-postgres
  template:
    metadata:
      labels:
        app: vola-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: vola-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vola-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vola-postgres
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U vola -d vola
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vola-postgres
  namespace: vola
spec:
  selector:
    app: vola-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
