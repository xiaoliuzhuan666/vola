apiVersion: apps/v1
kind: Deployment
metadata:
  name: neudrive-server
  namespace: neudrive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neudrive-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: neudrive-server
    spec:
      containers:
        - name: neudrive-server
          image: neudrive:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: neudrive-config
                  key: PORT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: neudrive-config
                  key: CORS_ORIGINS
            - name: PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: neudrive-config
                  key: PUBLIC_BASE_URL
            - name: GIT_MIRROR_HOSTED_ROOT
              valueFrom:
                configMapKeyRef:
                  name: neudrive-config
                  key: GIT_MIRROR_HOSTED_ROOT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: JWT_SECRET
            - name: VAULT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: VAULT_MASTER_KEY
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: GITHUB_CLIENT_SECRET
            - name: GITHUB_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: GITHUB_APP_CLIENT_ID
            - name: GITHUB_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: GITHUB_APP_CLIENT_SECRET
            - name: GITHUB_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: neudrive-app
                  key: GITHUB_APP_SLUG
          volumeMounts:
            - name: neudrive-git-mirrors
              mountPath: /data/git-mirrors
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: neudrive-git-mirrors
          persistentVolumeClaim:
            claimName: neudrive-git-mirrors
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neudrive-git-mirrors
  namespace: neudrive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neudrive-server
  namespace: neudrive
spec:
  selector:
    app: neudrive-server
  ports:
    - port: 8080
      targetPort: 8080
